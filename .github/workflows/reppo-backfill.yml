name: Reppo Backfill Pod URLs

# One-shot workflow that runs scripts/reppo-backfill-pod-urls.sh inside
# CI so REPPO_AGENT_ID + REPPO_API_KEY can be sourced from GH Actions
# secrets instead of an operator's shell env.
#
# Re-POSTs the 4 dataset-bearing pods that registered BEFORE PR #50
# with the corrected url (= IPFS gateway, not hypurrscan). Test on
# one pod first via the pod_hash input; if the UI updates cleanly,
# re-dispatch with pod_hash empty to backfill the remaining 3.
#
# Triggered manually:
#   gh workflow run "Reppo Backfill Pod URLs" -f pod_hash=06e7715d81cdedca
#   gh workflow run "Reppo Backfill Pod URLs"   # all 4

on:
  workflow_dispatch:
    inputs:
      pod_hash:
        description: 'Pod hash to backfill (first 16 chars). Leave empty for all 4.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run backfill
        env:
          REPPO_AGENT_ID: ${{ secrets.REPPO_AGENT_ID }}
          REPPO_API_KEY: ${{ secrets.REPPO_API_KEY }}
        run: |
          if [ -z "${REPPO_AGENT_ID:-}" ] || [ -z "${REPPO_API_KEY:-}" ]; then
            echo "::error::REPPO_AGENT_ID and/or REPPO_API_KEY secret(s) missing"
            exit 1
          fi
          chmod +x scripts/reppo-backfill-pod-urls.sh
          ./scripts/reppo-backfill-pod-urls.sh "${{ inputs.pod_hash }}"

      - name: Upload response captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-responses
          path: .reppo-cache/backfill-url-*.json
          retention-days: 7
          if-no-files-found: warn
